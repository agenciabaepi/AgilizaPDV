name: Build/release Agiliza PDV

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    environment: SUPABASE_ANON_KEY
    # Passa os secrets do environment como variáveis de ambiente para o script generate-env-install
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate embedded PostgreSQL files
        run: node scripts/windows/check-embedded-postgres.cjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install store-server dependencies
        run: npm --prefix store-server ci

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "const fs=require('fs'); const ref=process.env.GITHUB_REF_NAME||''; if(!ref.startsWith('v')) process.exit(0); const v=ref.slice(1); const pkgPath='package.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); pkg.version=v; fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\n'); console.log('App version set to', v);"

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agiliza-pdv-windows
          path: |
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

