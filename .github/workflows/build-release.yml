# Build instalador Windows. Para o app sair com Supabase configurado, defina os secrets
# SUPABASE_URL e SUPABASE_ANON_KEY em Settings → Secrets and variables → Actions (Repository secrets).
# Veja docs/github-secrets-supabase.md
name: Build/release Agiliza PDV

# Dispara em: push na main (build + publica Release) ou tag v*.*.* ou manual.
#
# IMPORTANTE: salvar arquivo no editor não dispara CI. É preciso commit + `git push origin main`.
# Cada push na main recebe versão única no CI (script ci-set-build-version.cjs) para o app Windows
# baixar via auto-update; sem isso, mesma versão no package.json = "já atualizado".
# Tags v*.*.*: versão vem do nome da tag (passo "Sync app version from tag").
# Para testar sem push: GitHub → Actions → este workflow → "Run workflow".
# Secrets: use Repository secrets (Settings → Secrets → Actions). Não use `environment:` aqui —
# um Environment mal configurado pode impedir o job de arrancar ou exigir aprovação oculta.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
      # electron-builder baixa o ZIP do Electron em GitHub Releases; 504 intermitente → cache + retry.
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Electron (ZIPs)
        uses: actions/cache@v4
        with:
          path: .electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Definir env Supabase para o build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$env:SUPABASE_URL" >> $env:GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY" >> $env:GITHUB_ENV

      - name: Verificar env Supabase (diagnóstico)
        run: |
          if ("$env:SUPABASE_URL") { echo "SUPABASE_URL está definido" } else { echo "SUPABASE_URL NÃO definido - adicione em Settings → Secrets and variables → Actions (Repository secrets)" }
          if ("$env:SUPABASE_ANON_KEY") { echo "SUPABASE_ANON_KEY está definido" } else { echo "SUPABASE_ANON_KEY NÃO definido" }

      - name: Validate embedded PostgreSQL files
        run: node scripts/windows/check-embedded-postgres.cjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install store-server dependencies
        run: npm --prefix store-server ci

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "const fs=require('fs'); const ref=process.env.GITHUB_REF_NAME||''; if(!ref.startsWith('v')) process.exit(0); const v=ref.slice(1); const pkgPath='package.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); pkg.version=v; fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\n'); console.log('App version set to', v);"

      - name: Versão única por push na main (auto-update no Windows)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node scripts/ci-set-build-version.cjs

      - name: Build Windows installer
        shell: pwsh
        run: |
          $attempts = 3
          $delaySec = 45
          for ($i = 1; $i -le $attempts; $i++) {
            npm run build:win
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $attempts) {
              Write-Host "::warning::build:win falhou (tentativa $i/$attempts). Aguardando ${delaySec}s antes de repetir (ex.: 504 ao baixar Electron)."
              Start-Sleep -Seconds $delaySec
            }
          }
          exit $LASTEXITCODE

      - name: Conferir latest.yml (auto-update Windows)
        shell: pwsh
        run: |
          $ymls = Get-ChildItem -Path release -Recurse -Filter 'latest*.yml' -File -ErrorAction SilentlyContinue
          if (-not $ymls) {
            Write-Host '::error::Nenhum latest*.yml em release/ — o electron-updater no app instalado nao encontra atualizacao.'
            Get-ChildItem -Path release -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
            exit 1
          }
          foreach ($f in $ymls) {
            Write-Host "=== $($f.FullName) ==="
            Get-Content $f.FullName
          }

      - name: Versão do package.json (tag da Release)
        id: appver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agiliza-pdv-windows
          path: |
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml

      - name: Create GitHub release (auto-update Windows)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ steps.appver.outputs.tag }}
          name: Agiliza PDV ${{ steps.appver.outputs.version }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/**/*.exe
            release/**/*.blockmap
            release/**/latest*.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

