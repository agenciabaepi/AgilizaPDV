# https://www.electron.build/configuration/configuration
appId: com.agiliza.pdv
productName: Agiliza PDV
directories:
  output: release/${version}
publish:
  provider: github
  owner: agenciabaepi
  repo: AgilizaPDV
  releaseType: release

# Launcher manual do store-server (duplo clique), ao lado de AgilizaPDV.exe.
extraFiles:
  - from: build/windows/AgilizaPDV-StoreServer.ps1
    to: AgilizaPDV-StoreServer.ps1
  - from: build/windows/AgilizaPDV-StoreServer.cmd
    to: AgilizaPDV-StoreServer.cmd
  - from: build/windows/AgilizaPDV-RepararServidor.ps1
    to: AgilizaPDV-RepararServidor.ps1
  - from: build/windows/AgilizaPDV-RepararServidor.cmd
    to: AgilizaPDV-RepararServidor.cmd

# Incluir a pasta out/ (main, preload, renderer) gerada pelo electron-vite build
# e as migrations SQL para criar/atualizar o banco (inclusive suporte_usuarios).
files:
  - out
  - backend/db/migrations
  - "!**/.vscode/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,*.d.ts}"
  - "!**/node_modules/.bin/*"

# better-sqlite3 é nativo; precisa ficar fora do asar
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Agiliza-PDV-Windows-${version}-Setup.${ext}
  executableName: AgilizaPDV

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  include: build/installer.nsh
  # Branding alinhado ao app (topbar #1e293b + primário #1d4ed8); gerados por scripts/windows/generate-nsis-bitmaps.mjs
  installerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp
  uninstallerSidebar: build/installerSidebar.bmp

# store-server roda com `AgilizaPDV.exe --store-server`: precisa de node_modules (dist só tem .js compilado).
extraResources:
  - from: env.install
    to: env.install
  - from: store-server/dist
    to: store-server/dist
  - from: store-server/node_modules
    to: store-server/node_modules
  - from: store-server/src/schema
    to: store-server/schema
  - from: store-server/package.json
    to: store-server/package.json
  - from: build/windows
    to: windows

mac:
  target:
    - dmg
  artifactName: ${productName}-Mac-${version}.${ext}
  category: public.app-category.business
  # Desativa assinatura para build local (evita erro "resource fork... not allowed" no codesign).
  # Para distribuir assinado, defina CSC_IDENTITY_AUTO_DISCOVERY=true e um certificado válido.
  identity: null

linux:
  target:
    - AppImage
  artifactName: ${productName}-Linux-${version}.${ext}
  category: Office

npmRebuild: false
